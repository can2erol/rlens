<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>rlens · dashboard</title>
<link rel="stylesheet" href="/static/uPlot.min.css" />
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#e6e9ef; --muted:#8b94a7; --accent:#6ea8fe; }
  * { box-sizing: border-box; }
  body { margin:0; font:13px/1.4 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .sub { color:var(--muted); }
  header .live { margin-left:auto; display:flex; align-items:center; gap:6px; color:var(--muted); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); display:inline-block; }
  .dot.running { background:#3fb950; box-shadow:0 0 6px #3fb950; }
  .dot.completed { background:var(--accent); }
  .dot.failed { background:#f85149; }
  main { display:grid; grid-template-columns:240px 1fr; height:calc(100vh - 49px); }
  aside { border-right:1px solid var(--line); overflow-y:auto; padding:8px; }
  aside h2 { font-size:11px; text-transform:uppercase; color:var(--muted); margin:8px 6px; letter-spacing:.6px; }
  .run { display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:7px; cursor:pointer; }
  .run:hover { background:#1d212a; }
  .run.focus { background:#222838; outline:1px solid var(--line); }
  .run input { accent-color:var(--accent); }
  .run .meta { display:flex; flex-direction:column; overflow:hidden; }
  .run .name { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .run .env { color:var(--muted); font-size:11px; }
  .swatch { width:10px; height:10px; border-radius:2px; flex:none; }
  .content { padding:14px; overflow-y:auto; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
  select { background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:4px 8px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px; }
  .card h3 { margin:0 0 8px; font-size:12px; color:var(--muted); font-weight:600; }
  .u-legend { font-size:11px; }
  .empty { color:var(--muted); padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>rlens</h1>
  <span class="sub">observability dashboard</span>
  <label class="live"><input type="checkbox" id="liveToggle" checked /> live</label>
</header>
<main>
  <aside>
    <h2>Runs</h2>
    <div id="runs"></div>
  </aside>
  <div class="content">
    <div class="toolbar">
      <label>metric</label>
      <select id="metricA"></select>
    </div>
    <div class="card"><div id="chartA"></div></div>
    <div class="grid2">
      <div class="card">
        <h3>secondary metric · <select id="metricB"></select></h3>
        <div id="chartB"></div>
      </div>
      <div class="card">
        <h3 id="histTitle">action distribution</h3>
        <div id="chartHist"></div>
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <h3 id="videoTitle">rollout · <select id="videoStep"></select></h3>
      <div id="videoWrap"><video id="rollout" controls autoplay loop muted style="max-width:100%;border-radius:8px"></video></div>
    </div>
  </div>
</main>
<script src="/static/uPlot.iife.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
